query GetTransactionsByPortfolio($parameters: transactionParametersInput) {
  transactionsByParameters(parameters: $parameters) {
    id
    transactionDate
    effectiveTransactionDate
    settlementDate
    typeCode
    reference
    status
    security {
      id
      name
      securityCode
      isinCode
    }
    currency {
      securityCode
    }
    price
  }
}
